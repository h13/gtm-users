name: "gtm-users"
description: "Declaratively manage Google Tag Manager user permissions via YAML"
author: "h13"

branding:
  icon: "users"
  color: "blue"

inputs:
  command:
    description: "Command to run (validate, plan, apply, export)"
    required: true
  config:
    description: "Path to config file"
    required: false
    default: "gtm-users.yaml"
  credentials:
    description: "GCP service account credentials JSON content"
    required: false
  format:
    description: "Output format (text, json)"
    required: false
    default: "text"
  auto-approve:
    description: "Skip confirmation prompt for apply"
    required: false
    default: "false"
  account-id:
    description: "GTM account ID (required for export)"
    required: false
  comment-on-pr:
    description: "Post plan output as a PR comment"
    required: false
    default: "true"
  go-version:
    description: "Go version to use for installation"
    required: false
    default: "stable"

outputs:
  result:
    description: "Command output"
    value: ${{ steps.run.outputs.result }}
  has-changes:
    description: "Whether the plan contains changes (true/false)"
    value: ${{ steps.run.outputs.has-changes }}

runs:
  using: "composite"
  steps:
    - name: Set up Go
      uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
      with:
        go-version: ${{ inputs.go-version }}
        cache: false

    - name: Install gtm-users
      shell: bash
      run: go install github.com/h13/gtm-users/cmd/gtm-users@${{ github.action_ref || 'latest' }}

    - name: Write credentials file
      if: inputs.credentials != ''
      shell: bash
      env:
        CREDENTIALS_CONTENT: ${{ inputs.credentials }}
      run: |
        CRED_FILE=$(mktemp)
        printf '%s' "$CREDENTIALS_CONTENT" > "$CRED_FILE"
        echo "GTMUSERS_CREDENTIALS_FILE=$CRED_FILE" >> "$GITHUB_ENV"

    - name: Run gtm-users
      id: run
      shell: bash
      env:
        INPUT_COMMAND: ${{ inputs.command }}
        INPUT_CONFIG: ${{ inputs.config }}
        INPUT_FORMAT: ${{ inputs.format }}
        INPUT_AUTO_APPROVE: ${{ inputs.auto-approve }}
        INPUT_ACCOUNT_ID: ${{ inputs.account-id }}
      run: |
        set +e

        ARGS=()
        case "$INPUT_COMMAND" in
          validate)
            ARGS+=(validate --config "$INPUT_CONFIG")
            ;;
          plan)
            ARGS+=(plan --config "$INPUT_CONFIG" --format "$INPUT_FORMAT")
            if [ -n "$GTMUSERS_CREDENTIALS_FILE" ]; then
              ARGS+=(--credentials "$GTMUSERS_CREDENTIALS_FILE")
            fi
            ;;
          apply)
            ARGS+=(apply --config "$INPUT_CONFIG")
            if [ -n "$GTMUSERS_CREDENTIALS_FILE" ]; then
              ARGS+=(--credentials "$GTMUSERS_CREDENTIALS_FILE")
            fi
            if [ "$INPUT_AUTO_APPROVE" = "true" ]; then
              ARGS+=(--auto-approve)
            fi
            ;;
          export)
            ARGS+=(export --account-id "$INPUT_ACCOUNT_ID")
            if [ -n "$GTMUSERS_CREDENTIALS_FILE" ]; then
              ARGS+=(--credentials "$GTMUSERS_CREDENTIALS_FILE")
            fi
            ;;
          *)
            echo "::error::Unknown command: $INPUT_COMMAND"
            exit 1
            ;;
        esac

        OUTPUT=$(gtm-users "${ARGS[@]}" 2>&1)
        EXIT_CODE=$?

        echo "result<<GTMUSERS_EOF" >> "$GITHUB_OUTPUT"
        echo "$OUTPUT" >> "$GITHUB_OUTPUT"
        echo "GTMUSERS_EOF" >> "$GITHUB_OUTPUT"

        if echo "$OUTPUT" | grep -q "No changes"; then
          echo "has-changes=false" >> "$GITHUB_OUTPUT"
        elif [ "$INPUT_FORMAT" = "json" ] && echo "$OUTPUT" | python3 -c "import sys,json; d=json.load(sys.stdin); sys.exit(0 if not d.get('changes') else 1)" 2>/dev/null; then
          echo "has-changes=false" >> "$GITHUB_OUTPUT"
        else
          echo "has-changes=true" >> "$GITHUB_OUTPUT"
        fi

        echo "$OUTPUT"
        exit $EXIT_CODE

    - name: Cleanup credentials
      if: always() && inputs.credentials != ''
      shell: bash
      run: rm -f "$GTMUSERS_CREDENTIALS_FILE"

    - name: Comment on PR
      if: >-
        inputs.command == 'plan'
        && inputs.comment-on-pr == 'true'
        && github.event_name == 'pull_request'
      uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
      env:
        PLAN_OUTPUT: ${{ steps.run.outputs.result }}
        WORKFLOW_NAME: ${{ github.workflow }}
      with:
        script: |
          const planOutput = process.env.PLAN_OUTPUT;
          const workflowName = process.env.WORKFLOW_NAME;
          const output = `#### GTM Users Plan

          \`\`\`
          ${planOutput}
          \`\`\`

          *Run by Action: \`${workflowName}\`*`;

          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });

          const existing = comments.find(c =>
            c.user.type === 'Bot' && c.body.includes('GTM Users Plan')
          );

          if (existing) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body: output,
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: output,
            });
          }
