version: 2

builds:
  - main: ./cmd/gtm-users/
    binary: gtm-users
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

brews:
  - repository:
      owner: h13
      name: homebrew-tap
    homepage: https://github.com/h13/gtm-users
    description: Declarative Google Tag Manager permission management CLI
    license: MIT
    install: |
      bin.install "gtm-users"
    test: |
      system bin/"gtm-users", "--version"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^ci:"
