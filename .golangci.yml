version: "2"

formatters:
  enable:
    - gofmt
    - goimports

linters:
  enable:
    - bodyclose
    - copyloopvar
    - dupl
    - errname
    - exhaustive
    - gocognit
    - goconst
    - gocritic
    - gocyclo
    - godot
    - gosec
    - misspell
    - nakedret
    - nilerr
    - prealloc
    - predeclared
    - revive
    - unconvert
    - unparam
    - whitespace

  settings:
    gocyclo:
      min-complexity: 15
    gocognit:
      min-complexity: 20
    goconst:
      min-len: 3
      min-occurrences: 3
    revive:
      rules:
        - name: exported
          disabled: true

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - dupl
          - goconst
          - gocognit
          - gocyclo
